services:
  - type: web
    name: dataquery-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dataquery-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_UPLOAD_MB
        value: "50"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: PYTHON_VERSION
        value: "3.12.3"

databases:
  - name: dataquery-db
    plan: free
    databaseName: dataquery

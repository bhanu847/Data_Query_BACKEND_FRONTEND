services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dataquery
      POSTGRES_PASSWORD: dataquery
      POSTGRES_DB: dataquery
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://dataquery:dataquery@db:5432/dataquery
      JWT_SECRET: change-me
      CORS_ORIGINS: http://localhost:5173
    ports: ["8000:8000"]
    depends_on: [db]

volumes:
  pgdata:
